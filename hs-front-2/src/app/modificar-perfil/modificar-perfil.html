<div class="app-shell">
    <aside class="sidebar"><a class="hs-logo" routerLink="/"><span class="hs-logo-mark">H&S</span><span
                class="hs-logo-text"><strong>Perfil</strong><span>Mis datos</span></span></a>
        <nav class="side-nav"><a class="side-link" routerLink="/dashboard-paciente">🏠 Inicio</a><a
                class="side-link active" routerLink="/modificar-perfil">⚙️ Modificar datos</a></nav>
    </aside>
    <main class="main-content">hs
        <div class="page-head">
            <div>
                <h1>Modificar datos</h1>
                <p>Actualiza correo, teléfono, dirección, contraseña y fecha de nacimiento.</p>
            </div>
        </div>
        <div class="content-card">
            <form (ngSubmit)="guardar()" class="form-grid">
                <div class="form-group"><label>Correo</label><input class="form-control" [(ngModel)]="correo"
                        name="correo"></div>
                <div class="form-group"><label>Teléfono</label><input class="form-control" [(ngModel)]="telefono"
                        name="telefono"></div>
                <div class="form-group"><label>Dirección</label><input class="form-control" [(ngModel)]="direccion"
                        name="direccion"></div>
                <div class="form-group"><label>Fecha nacimiento</label><input class="form-control" type="date"
                        [(ngModel)]="fechaNacimiento" name="fechaNacimiento"></div>
                <div class="form-group full"><label>Nueva contraseña</label><input class="form-control" type="password"
                        [(ngModel)]="password" name="password"></div>
                <p class="form-error full" *ngIf="mensaje">{{mensaje}}</p>
                <div class="full"><button class="hs-btn" type="submit">Guardar cambios</button></div>
            </form>
        </div>
    </main>
</div>
