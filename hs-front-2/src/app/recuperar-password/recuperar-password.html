<div class="auth-page"><section class="auth-brand"><a class="hs-logo" routerLink="/"><span class="hs-logo-mark">H&S</span><span class="hs-logo-text"><strong>Health & Schedule</strong><span>Recuperación</span></span></a><div><h2>Recupera tu acceso.</h2><p>Ingresa tu RUT o correo para generar una contraseña temporal.</p></div></section><section class="auth-panel"><div class="auth-card"><h2>Contraseña olvidada</h2><p>Te entregaremos una contraseña temporal para ingresar.</p><form (ngSubmit)="recuperar()"><div class="form-group"><label>RUT o correo</label><input class="form-control" [(ngModel)]="rutOCorreo" name="rutOCorreo" required></div><button class="hs-btn" type="submit">Recuperar contraseña</button></form><p class="form-error" *ngIf="mensaje">{{mensaje}}</p><div class="content-card" *ngIf="passwordTemporal"><b>Contraseña temporal:</b><h2>{{passwordTemporal}}</h2></div><p class="auth-link"><a routerLink="/login">Volver al login</a></p></div></section></div>
