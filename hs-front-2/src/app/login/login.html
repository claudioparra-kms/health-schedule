<div class="v29_3">

  <span class="v7_3">H&S</span>

  <div class="v7_4"></div>

  <!-- LOGIN NORMAL DEL WIREFRAME -->
  <form (ngSubmit)="login()">

    <span class="v7_58">RUT</span>
    <input
      type="text"
      [(ngModel)]="rut"
      name="rut"
      class="v7_59"
      required
    >

    <span class="v7_60">Contraseña</span>
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      class="v7_62"
      required
    >

    <button type="submit" class="v7_68 v7_66">
      Iniciar sesión
    </button>

  </form>

  <span class="v7_64">¿Olvidaste tu contraseña?</span>

  <!-- INVITADO -->
  <span class="v7_guest_text">Entrar como invitado</span>

  <input
    type="text"
    [(ngModel)]="rutInvitado"
    name="rutInvitado"
    placeholder="Ingresa tu RUT"
    class="v7_guest_input"
  >

  <button
    type="button"
    class="v7_guest_button"
    (click)="guestLogin()"
  >
    Entrar
  </button>

  <span class="v7_65">
    ¿No tienes una cuenta?<br>
    Crea una
  </span>

</div>
