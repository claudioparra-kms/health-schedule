name: "Health and Schedule"
on:
  pull_request:
    branches: [main]
    paths:
      - "hs-front-2/**"
      - ".github/workflows/hs-front-wf.yml"
  push:
    branches: [main]
    paths:
      - "hs-front-2/**"
      - ".github/workflows/hs-front-wf.yml"
permissions:
  contents: read
concurrency:
  group: angular-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-test:
    name: "Construir Angular"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: "Checkout del código fuente"
        uses: actions/checkout@v4

      - name: "Configurar Node.js ${{ matrix.node-version }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: hs-front-2/package-lock.json

      - name: "Instalar dependencias"
        working-directory: hs-front-2
        run: npm install

      - name: "Lint — Verificar calidad del código"
        working-directory: hs-front-2
        continue-on-error: true
        run: npx ng lint 2>/dev/null || echo "Linting no configurado — considera agregar ESLint al proyecto"

      - name: "Build — Compilar proyecto Angular"
        working-directory: hs-front-2
        run: npm run build -- --configuration production

      - name: "Subir reporte de cobertura"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hs-front-coverage${{ matrix.node-version }}
          path: hs-front-2/coverage/
          retention-days: 14