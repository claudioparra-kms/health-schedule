name: "Health & Schedule - Frontend CI"

on:
  pull_request:
    branches: [main]
    paths:
      - "hs-front-2/**"
      - ".github/workflows/hs-front-wf.yml"
  push:
    branches: [main]
    paths:
      - "hs-front-2/**"
      - ".github/workflows/hs-front-wf.yml"

permissions:
  contents: read

concurrency:
  group: angular-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: "Angular build + tests"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: "Checkout del código fuente"
        uses: actions/checkout@v4

      - name: "Configurar Node.js ${{ matrix.node-version }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: hs-front-2/package-lock.json

      - name: "Instalar dependencias reproducibles"
        working-directory: hs-front-2
        run: npm ci

      - name: "Ejecutar pruebas automatizadas"
        working-directory: hs-front-2
        run: npm run test:ci

      - name: "Compilar Angular en producción"
        working-directory: hs-front-2
        run: npm run build -- --configuration production
