name: "Health & Schedule - Backend CI"

on:
  pull_request:
    branches:
      - main
    paths:
      - "hs-back-2/**"
      - ".github/workflows/hs-back-wf.yml"

  push:
    branches:
      - main
    paths:
      - "hs-back-2/**"
      - ".github/workflows/hs-back-wf.yml"

permissions:
  contents: read

concurrency:
  group: dotnet-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ".NET build"
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: "Descargar código fuente"
        uses: actions/checkout@v4

      - name: "Configurar .NET SDK 10"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: "Restaurar dependencias"
        run: dotnet restore hs-back-2/proyecto-ids-api.csproj

      - name: "Compilar backend"
        run: dotnet build hs-back-2/proyecto-ids-api.csproj --configuration Release --no-restore